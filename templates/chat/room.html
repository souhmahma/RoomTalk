<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room : {{ room_name }}</title>
    <style>
        :root {
            --primary: #00a2ff;
            --primary-hover: #0084ff;
            --bg: #0b0e11;
            --surface: #15191c;
            --bubble-me: #0084ff;
            --bubble-others: #2f3336;
            --text: #e7e9ea;
            --text-muted: #71767b;
            --border: #2f3336;
            --accent: #1d9bf0;
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1d9bf010, transparent),
                              radial-gradient(circle at bottom left, #00a2ff05, transparent);
            color: var(--text);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 95vh;
            background: rgba(21, 25, 28, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        header {
            padding: 15px 25px;
            background: rgba(21, 25, 28, 0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        header h2 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ba7c;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ba7c;
        }

        #messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .message-row {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: slideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .username {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
            margin-left: 12px;
        }

        .message-bubble {
            padding: 12px 18px;
            border-radius: 20px;
            background-color: var(--bubble-others);
            font-size: 0.95rem;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message-row.me {
            align-self: flex-end;
            align-items: flex-end;
        }
        
        .message-row.me .message-bubble {
            background-color: var(--bubble-me);
            color: white;
            border-bottom-right-radius: 4px;
        }

        /* Multimédia */
        .file-attachment {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            margin-top: 8px;
            display: block;
            border: 1px solid var(--border);
        }

        audio {
            width: 100%;
            margin-top: 8px;
            filter: invert(1) hue-rotate(180deg); /* Adaptation au thème sombre */
        }

        .input-area {
            padding: 20px;
            background: rgba(21, 25, 28, 0.8);
            border-top: 1px solid var(--border);
        }

        .user-settings {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding-left: 10px;
        }

        #username {
            background: transparent;
            border: 1px solid transparent;
            color: var(--accent);
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
        }

        #username:hover, #username:focus {
            background: var(--surface);
            border-color: var(--border);
        }

        .input-wrapper {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 16px;
            align-items: center;
            gap: 12px;
        }

        #message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            padding: 8px 0;
            font-size: 1rem;
            outline: none;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--accent);
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .action-btn:hover {
            background: rgba(29, 155, 240, 0.1);
            transform: scale(1.1);
        }

        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="chat-container">
        <header>
            <div><span class="status-dot"></span><h2># {{ room_name }}</h2></div>
            <div style="color: var(--text-muted); font-size: 0.8rem;"></div>
        </header>

        <div id="messages"></div>

        <div class="input-area">
            <div class="user-settings">
                <span style="font-size: 0.8rem; color: var(--text-muted);">As :</span>
                <input id="username" type="text" value="Connexion..." title="Cliquez pour changer votre pseudo">
            </div>
            
            <div class="input-wrapper">
                <label for="file-input" class="action-btn" title="Envoyer un média">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                </label>
                <input type="file" id="file-input" onchange="sendFile()">
                
                <input id="message-input" type="text" placeholder="Écrivez un message..." autocomplete="off">
                
                <button class="action-btn" onclick="sendMessage()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const roomName = "{{ room_name }}";
        const socket = new WebSocket(`ws://${window.location.host}/ws/chat/${roomName}/`);
        const messagesDiv = document.getElementById("messages");
        const currentUsernameInput = document.getElementById("username");

        socket.onmessage = function(e) {
            const data = JSON.parse(e.data);

            // Gestion de l'attribution initiale du pseudo
            if (data.type === "setup") {
                currentUsernameInput.value = data.suggested_username;
                return;
            }

            const isMe = data.username === currentUsernameInput.value;
            let content = "";

            if (data.file_url) {
                const url = data.file_url;
                const fileName = data.file_name || "Click to download";

                if (data.is_image) {
                    content = `<img src="${url}" class="file-attachment" alt="image"/>`;
                } 
                // Détection Vidéo
                else if (url.includes("video/") || url.endsWith(".mp4") || url.endsWith(".webm")) {
                    content = `<video controls class="file-attachment"><source src="${url}">Lecteur non supporté.</video>`;
                }
                // Détection Audio
                else if (url.includes("audio/") || url.endsWith(".mp3") || url.endsWith(".wav")) {
                    content = `<audio controls><source src="${url}">Audio non supporté.</audio>`;
                }
                // Autre fichier
                else {
                    content = `<a href="${url}" target="_blank" style="color:var(--accent); text-decoration:none; font-weight:bold;">📄 ${fileName}</a>`;
                }
            } else {
                content = data.message;
            }

            if (!content) return;

            const html = `
                <div class="message-row ${isMe ? 'me' : ''}">
                    <span class="username">${isMe ? 'Moi' : data.username}</span>
                    <div class="message-bubble">${content}</div>
                </div>`;
            
            messagesDiv.insertAdjacentHTML('beforeend', html);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        };

        function sendMessage() {
            const input = document.getElementById("message-input");
            const user = currentUsernameInput.value;
            if(input.value.trim()) {
                socket.send(JSON.stringify({
                    type: 'text', 
                    message: input.value, 
                    username: user
                }));
                input.value = "";
            }
        }

        function sendFile() {
            const file = document.getElementById('file-input').files[0];
            const user = currentUsernameInput.value;
            if(file) {
                const reader = new FileReader();
                reader.onload = e => socket.send(JSON.stringify({
                    type: 'file', 
                    file_name: file.name, 
                    file_data: e.target.result, 
                    username: user, 
                    is_image: file.type.startsWith('image/')
                }));
                reader.readAsDataURL(file);
                document.getElementById('file-input').value = ""; // Reset
            }
        }

        document.getElementById("message-input").onkeypress = e => { 
            if(e.key === "Enter") sendMessage(); 
        };
    </script>
</body>
</html>
